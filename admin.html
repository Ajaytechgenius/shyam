<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rev Nation — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07080a; --panel:#0e1013; --card:#101318;
  --ink:#f3f1ec; --muted:#8d9096; --gold:#cda86a; --line:rgba(255,255,255,.08);
}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh;}
h1,h2,.display{font-family:'Fraunces',serif;}

/* Sidebar */
.sidebar{width:250px;background:var(--panel);border-right:1px solid var(--line);padding:30px 22px;display:flex;flex-direction:column;}
.brand{font-family:'Fraunces',serif;font-weight:700;font-size:1.3rem;margin-bottom:40px;}
.brand em{font-style:italic;color:var(--gold);}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.86rem;margin-bottom:6px;cursor:pointer;transition:.2s;}
.nav-item.active,.nav-item:hover{background:rgba(205,168,106,.08);color:var(--ink);}
.nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}
.sidebar-foot{margin-top:auto;font-size:.7rem;color:var(--muted);}

/* Main */
.main{flex:1;padding:36px 44px;overflow-y:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:34px;}
.topbar h1{font-size:1.6rem;font-weight:700;}
.topbar p{color:var(--muted);font-size:.85rem;margin-top:4px;}
.btn{background:linear-gradient(135deg,var(--gold),#a9834a);color:#0a0a0a;border:none;padding:12px 22px;border-radius:10px;font-weight:700;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}

/* Stat cards */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:36px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;}
.stat-card .label{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
.stat-card .value{font-family:'Fraunces',serif;font-size:2rem;font-weight:700;margin-top:8px;color:var(--gold);}

/* Table */
.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.panel-head h3{font-size:1.05rem;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--line);}
td{padding:14px 12px;font-size:.86rem;border-bottom:1px solid var(--line);}
tr:last-child td{border-bottom:none;}
.badge{padding:5px 12px;border-radius:20px;font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;}
.badge.new{background:rgba(205,168,106,.15);color:var(--gold);}
.badge.confirmed{background:rgba(120,220,150,.15);color:#78dc96;}
.badge.done{background:rgba(150,150,150,.15);color:#aaa;}
select.status-select{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:.78rem;}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;}
.icon-btn:hover{color:#ff6b6b;}
.empty{text-align:center;color:var(--muted);padding:50px 0;font-size:.9rem;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">REV<em>NATION</em></div>
  <a class="nav-item active"><span class="dot"></span> Dashboard</a>
  <a class="nav-item"><span class="dot" style="background:transparent"></span> Bookings</a>
  <a class="nav-item"><span class="dot" style="background:transparent"></span> Gallery</a>
  <a class="nav-item"><span class="dot" style="background:transparent"></span> Testimonials</a>
  <a class="nav-item"><span class="dot" style="background:transparent"></span> Settings</a>
  <div class="sidebar-foot">Rev Nation Admin v1.0</div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <h1>Bookings Overview</h1>
      <p>Live data captured from the website's booking form.</p>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn ghost" id="export-csv">Export CSV</button>
      <button class="btn" id="clear-all">Clear All</button>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-card"><div class="label">Total Bookings</div><div class="value" id="stat-total">0</div></div>
    <div class="stat-card"><div class="label">New</div><div class="value" id="stat-new">0</div></div>
    <div class="stat-card"><div class="label">Confirmed</div><div class="value" id="stat-confirmed">0</div></div>
    <div class="stat-card"><div class="label">Completed</div><div class="value" id="stat-done">0</div></div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h3>Recent Requests</h3>
    </div>
    <div id="table-wrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Phone</th><th>Vehicle</th><th>Service</th><th>Date</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="bookings-body"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
function getBookings(){ return JSON.parse(localStorage.getItem('revnation_bookings')||'[]'); }
function saveBookings(list){ localStorage.setItem('revnation_bookings', JSON.stringify(list)); }

function render(){
  const bookings = getBookings();
  const body = document.getElementById('bookings-body');

  document.getElementById('stat-total').textContent = bookings.length;
  document.getElementById('stat-new').textContent = bookings.filter(b=>b.status==='New').length;
  document.getElementById('stat-confirmed').textContent = bookings.filter(b=>b.status==='Confirmed').length;
  document.getElementById('stat-done').textContent = bookings.filter(b=>b.status==='Done').length;

  if(bookings.length===0){
    body.innerHTML = `<tr><td colspan="7" class="empty">No bookings yet — submissions from the website will appear here automatically.</td></tr>`;
    return;
  }

  body.innerHTML = bookings.map(b=>`
    <tr>
      <td>${b.name}</td>
      <td>${b.phone}</td>
      <td>${b.vehicle}</td>
      <td>${b.service}</td>
      <td>${new Date(b.date).toLocaleDateString()}</td>
      <td>
        <select class="status-select" data-id="${b.id}">
          <option ${b.status==='New'?'selected':''}>New</option>
          <option ${b.status==='Confirmed'?'selected':''}>Confirmed</option>
          <option ${b.status==='Done'?'selected':''}>Done</option>
        </select>
      </td>
      <td><button class="icon-btn" data-del="${b.id}">✕</button></td>
    </tr>
  `).join('');

  body.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('change', ()=>{
      const list = getBookings();
      const item = list.find(x=>x.id==sel.dataset.id);
      if(item){ item.status = sel.value; saveBookings(list); render(); }
    });
  });
  body.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const list = getBookings().filter(x=>x.id != btn.dataset.del);
      saveBookings(list); render();
    });
  });
}

document.getElementById('clear-all').addEventListener('click', ()=>{
  if(confirm('Delete all bookings?')){ saveBookings([]); render(); }
});

document.getElementById('export-csv').addEventListener('click', ()=>{
  const bookings = getBookings();
  if(!bookings.length) return alert('No data to export.');
  const rows = [['Name','Phone','Vehicle','Service','Status','Date'],
    ...bookings.map(b=>[b.name,b.phone,b.vehicle,b.service,b.status,new Date(b.date).toLocaleString()])];
  const csv = rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'revnation-bookings.csv';
  a.click();
});

render();
</script>
</body>
</html>
