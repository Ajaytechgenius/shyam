<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rev Nation | Secure Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030303;
  --surface: #0a0a0a;
  --surface-hover: #121212;
  --border: rgba(255, 255, 255, 0.08);
  --ink: #fdfdfd;
  --ink-dim: rgba(253, 253, 253, 0.45);
  --accent: #ffffff;
  --sans: 'Inter', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 300;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  -webkit-font-smoothing: antialiased;
  display: flex;
  min-height: 100vh;
  overflow: hidden;
}
a, button, input, textarea { font-family: inherit; color: inherit; outline: none; border: none; background: transparent; }
a { text-decoration: none; }
ul { list-style: none; }
   .sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 40px 30px;
  display: flex;
  flex-direction: column;
  gap: 50px;
  z-index: 10;
}
.brand {
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.nav-menu {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 16px;
  color: var(--ink-dim);
  transition: all 0.3s ease;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 6px;
}
.nav-link:hover, .nav-link.active {
  color: var(--ink);
  background: var(--surface-hover);
}
.main-content {
  flex: 1;
  padding: 60px 5vw;
  overflow-y: auto;
  position: relative;
}
.header {
  margin-bottom: 60px;
}
.page-title {
  font-size: 32px;
  font-weight: 300;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.page-subtitle {
  color: var(--ink-dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 50px;
  border-radius: 12px;
  max-width: 800px;
}
.form-group {
  margin-bottom: 35px;
}
.form-label {
  display: block;
  margin-bottom: 12px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-dim);
}
.form-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 18px;
  color: var(--ink);
  font-size: 14px;
  border-radius: 6px;
  transition: border-color 0.3s ease;
}
.form-input:focus {
  border-color: var(--ink-dim);
}
textarea.form-input {
  resize: vertical;
  min-height: 150px;
}
.upload-zone {
  border: 1px dashed var(--border);
  background: var(--bg);
  padding: 80px 20px;
  text-align: center;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--ink-dim);
  background: rgba(255, 255, 255, 0.02);
}
.upload-text {
  font-size: 12px;
  color: var(--ink-dim);
  letter-spacing: 0.05em;
}
.upload-highlight {
  color: var(--ink);
  text-decoration: underline;
}
.file-input {
  display: none;
}
#image-preview {
  display: none;
  width: 100%;
  max-height: 300px;
  object-fit: cover;
  border-radius: 6px;
  margin-top: 20px;
  border: 1px solid var(--border);
}
.btn {
  background: var(--ink);
  color: var(--bg);
  padding: 18px 40px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.3s ease, opacity 0.3s ease;
  width: auto;
  display: inline-block;
}
.btn:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}
.btn:active {
  transform: translateY(0);
}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand">Rev Nation</div>
  <ul class="nav-menu">
    <li><a href="#" class="nav-link">Dashboard</a></li>
    <li><a href="#" class="nav-link active">Add Project Log</a></li>
    <li><a href="#" class="nav-link">Gallery Media</a></li>
    <li><a href="#" class="nav-link">Settings</a></li>
  </ul>
</aside>

<main class="main-content">
  <header class="header">
    <h1 class="page-title">Project Logs</h1>
    <p class="page-subtitle">Upload and document recent detailing projects.</p>
  </header>

  <section class="card">
    <form id="upload-form">
      <div class="form-group">
        <label class="form-label">Vehicle & Service Title</label>
        <input type="text" class="form-input" placeholder="e.g. Porsche 911 GT3 RS - Full PPF & Ceramic" required>
      </div>

      <div class="form-group">
        <label class="form-label">Project Media</label>
        <div class="upload-zone" id="drop-zone">
          <span class="upload-text" id="upload-instruction">Drag and drop high-res image here or <span class="upload-highlight">click to browse</span>.</span>
          <input type="file" id="file-input" class="file-input" accept="image/png, image/jpeg, image/webp" required>
          <img id="image-preview" alt="">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Log Details</label>
        <textarea class="form-input" placeholder="Describe the process, materials used, and client requirements..." required></textarea>
      </div>

      <button type="submit" class="btn">Publish Log</button>
    </form>
  </section>
</main>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.addEventListener('contextmenu', e => e.preventDefault());

  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || e.keyCode === 123) e.preventDefault();
    if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) e.preventDefault();
    if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C', 'i', 'j', 'c'].includes(e.key)) e.preventDefault();
  });

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const imagePreview = document.getElementById('image-preview');
  const uploadInstruction = document.getElementById('upload-instruction');

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
  });

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
      fileInput.files = e.dataTransfer.files;
      handleFile(fileInput.files[0]);
    }
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) {
      handleFile(fileInput.files[0]);
    }
  });

  function handleFile(file) {
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => {
        imagePreview.src = e.target.result;
        imagePreview.style.display = 'block';
        uploadInstruction.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }
  }
});
</script>
</body>
</html>
